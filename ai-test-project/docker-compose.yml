services:
  web:
    build: .
    ports:
      - "5001:5000"
    environment:
      - APP_ENV=development
      - PORT=5000
    volumes:
      - ./src:/app
    restart: always

  # Optional: Sidecar for AI model integration (e.g., Ollama)
